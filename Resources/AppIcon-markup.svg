<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#eeece5"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dedbd2"/>
      <stop offset="1" stop-color="#cfccc2"/>
    </linearGradient>
  </defs>

  <!-- Page body (squircle with folded top-right corner) -->
  <path d="M 270 80
           H 714
           L 944 310
           V 754
           Q 944 944 754 944
           H 270
           Q 80 944 80 754
           V 270
           Q 80 80 270 80 Z"
        fill="url(#page)" stroke="#2b2f36" stroke-width="38"
        stroke-linejoin="round"/>

  <!-- Folded corner (page-turn) -->
  <path d="M 714 80 L 944 310 L 714 310 Z"
        fill="url(#fold)" stroke="#2b2f36" stroke-width="38"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Inner content -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center divider -->
    <line x1="512" y1="340" x2="512" y2="752" stroke="#b8b4ab" stroke-width="16"/>

    <!-- LEFT: formatted (rich) view -->
    <g stroke="#2b2f36">
      <line x1="200" y1="372" x2="436" y2="372" stroke-width="46"/>
      <line x1="200" y1="466" x2="468" y2="466" stroke-width="28"/>
      <line x1="200" y1="552" x2="468" y2="552" stroke-width="28"/>
      <line x1="200" y1="638" x2="226" y2="638" stroke-width="28"/>
      <line x1="266" y1="638" x2="468" y2="638" stroke-width="28"/>
    </g>

    <!-- RIGHT: the MarkUp mark — bold "M" + up arrow, accent blue -->
    <g stroke="#1f5fbf" stroke-width="32">
      <!-- M -->
      <polyline points="600,486 600,378 648,438 696,378 696,486"/>
      <!-- up arrow -->
      <line x1="748" y1="486" x2="748" y2="384"/>
      <polyline points="726,408 748,382 770,408"/>
    </g>

    <!-- supporting raw-markdown lines on the right -->
    <g stroke="#2b2f36">
      <line x1="560" y1="566" x2="820" y2="566" stroke-width="28"/>
      <rect x="560" y="624" width="46" height="46" rx="10" stroke-width="24"/>
      <line x1="640" y1="647" x2="820" y2="647" stroke-width="28"/>
      <line x1="560" y1="730" x2="586" y2="730" stroke-width="28"/>
      <line x1="626" y1="730" x2="820" y2="730" stroke-width="28"/>
    </g>
  </g>
</svg>
